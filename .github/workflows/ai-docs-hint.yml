name: ai-docs-hint

on:
  pull_request:
    paths:
      - "docs/diagrams/*.mmd"

jobs:
  hint:
    runs-on: ubuntu-latest
    steps:
      - name: Comment hint
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: "Mermaid diagram changed. Please run `pwsh -File scripts/make-ai-docs.ps1 -Mode render` and commit the updated PNG/SVG."
            })
