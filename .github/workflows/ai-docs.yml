name: ai-docs

on:
  pull_request:
    paths:
      - "docs/**"
      - "scripts/**"
      - ".github/workflows/ai-docs.yml"
  push:
    branches: [ "main" ]
    paths:
      - "docs/**"
      - "scripts/**"
      - ".github/workflows/ai-docs.yml"

jobs:
  verify:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify docs links
        shell: pwsh
        run: |
          pwsh -NoProfile -File .\scripts\verify-ai-docs.ps1 -Mode check
